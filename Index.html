<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANNY GOODY - AI Calculus Solver</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Segoe UI, Tahoma, sans-serif;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow-y: auto; 
  padding: 20px 0;
}

/* FLOATING NUMBERS BACKGROUND */
.number-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.number{position:absolute;color:rgba(56,189,248,.25);animation:float linear infinite;font-size:16px;}
@keyframes float{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}

/* APP CONTAINER */
.app{
  background:rgba(15,23,42,.9);
  backdrop-filter:blur(10px);
  width:100%;
  max-width:520px;
  padding:20px;
  border-radius:20px;
  color:white;
  z-index:1;
  box-shadow:0 10px 40px rgba(0,0,0,.6);
}

.title{text-align:center;font-size:24px;color:#38bdf8}
.subtitle{text-align:center;font-size:12px;opacity:.7;margin-bottom:12px}

input{
  width:100%;padding:12px;font-size:16px;
  border-radius:8px;border:1px solid #334155;
  background:#1e293b;color:white;margin-bottom:10px;
}

.buttons{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}

button{
  padding:10px;border:none;border-radius:8px;
  background:#334155;color:white;font-weight:bold;
  cursor:pointer;transition:.2s;
}
button:hover{background:#38bdf8;color:black}

.solve{grid-column:span 3;background:#22c55e}
.clear{grid-column:span 3;background:#ef4444}

.result,.steps,.ai{
  background:#020617;margin-top:10px;padding:10px;
  border-radius:8px;font-size:14px;
  border:1px solid #1e293b;max-height:160px;overflow:auto;
}

/* AI CHATBOX STYLES */
.chat-container {
  margin-top: 20px;
  border-top: 2px solid #334155;
  padding-top: 15px;
}
.chat-box {
  background: #020617;
  height: 180px;
  overflow-y: auto;
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 10px;
  border: 1px solid #38bdf8;
}
.chat-input-area { display: flex; gap: 5px; }
.chat-input-area input { margin-bottom: 0; flex-grow: 1; font-size: 14px; }
.chat-input-area button { padding: 5px 15px; background: #38bdf8; color: #000; }
.bot-msg { color: #38bdf8; margin-bottom: 8px; line-height: 1.4; }
.user-msg { color: #fff; opacity: 0.8; margin-bottom: 8px; text-align: right; }

.cheat-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 5px; color: #38bdf8; }
.cheat-table td { border: 1px solid #334155; padding: 3px; }

.toggle{text-align:right;margin-bottom:5px}
.toggle button{
  font-size:11px;padding:4px 7px;background:transparent;
  border:1px solid #38bdf8;color:#38bdf8;margin-left:4px;
}

canvas{background:white;border-radius:10px;margin-top:12px;width:100%;max-height:200px}

#volumeSlider{width:100%;margin-top:5px;}

/* LIGHT MODE SUPPORT */
.light{background:#e2e8f0}
.light .app{background:white;color:#0f172a}
.light button{background:#cbd5e1;color:#0f172a}
.light input{background:white;color:black}
.light .result,.light .steps,.light .ai,.light .chat-box{background:#f1f5f9;color:#0f172a}

/* ROBOT & EQ */
#robot{
  position:fixed;
  right:15px;
  bottom:20px;
  font-size:80px;
  display:none;
  animation:dance .5s infinite alternate;
  filter:drop-shadow(0 0 15px #38bdf8);
  z-index: 10;
}
@keyframes dance{
  0%{transform:rotate(-10deg) translateY(0)}
  50%{transform:rotate(10deg) translateY(-15px)}
  100%{transform:rotate(-10deg) translateY(0)}
}
#robot::after{
  content:"";
  position:absolute;
  left:25px;
  top:28px;
  width:6px;
  height:6px;
  background:#38bdf8;
  border-radius:50%;
  box-shadow:20px 0 #38bdf8;
  animation:blink 1.5s infinite;
}
@keyframes blink{0%,90%,100%{opacity:1}95%{opacity:0}}

#equalizer{
  position:fixed;
  right:30px;
  bottom:110px;
  display:none;
  display:flex;
  gap:3px;
  z-index: 10;
}
.eq{width:5px;height:15px;background:#38bdf8;animation:beat .4s infinite alternate;}
.eq:nth-child(2){animation-delay:.1s}
.eq:nth-child(3){animation-delay:.2s}
.eq:nth-child(4){animation-delay:.3s}
@keyframes beat{from{height:10px}to{height:35px}}
</style>
</head>
<body id="body">

<div class="number-bg" id="number-bg"></div>

<div class="app">
  <div class="toggle">
    <button onclick="toggleMode()">🌗</button>
    <button onclick="toggleMusic()">🎵</button>
    <button onclick="startVoice()">🎙</button>
    <button onclick="speakResult()">🔊</button>
    <button onclick="openCamera()">📷 Scan</button>
    <input type="file" id="imgUpload" style="display:none" onchange="handleUpload(event)">
    <button onclick="document.getElementById('imgUpload').click()">🖼 Upload</button>
  </div>

  <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" style="display:none;">

  <h1 class="title">CANNY GOODY</h1>
  <div class="subtitle">Derivative Solver • FreddyyGroup</div>

  <input id="display" placeholder="Enter function e.g. 3x^2 + sin(x)">
  <input id="order" type="number" value="1" min="1" max="10" placeholder="Order">

  <div class="buttons">
    <button onclick="add('sin(')">sin</button>
    <button onclick="add('cos(')">cos</button>
    <button onclick="add('tan(')">tan</button>
    <button onclick="add('ln(')">ln</button>
    <button onclick="add('sqrt(')">√</button>
    <button onclick="add('^')">^</button>

    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('+')">+</button>
    <button onclick="add('-')">−</button>
    <button onclick="add('*')">×</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('/')">÷</button>
    <button onclick="add('x')">x</button>
    <button onclick="add('(')">(</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('0')">0</button>
    <button onclick="add(')')">)</button>
    <button onclick="add('PI')">π</button>

    <button class="solve" onclick="solveWithSteps(display.value)">SOLVE</button>
    <button class="clear" onclick="clearAll()">CLEAR</button>
  </div>

  <div class="result" id="result">Result:</div>
  <div class="steps" id="steps">Steps:</div>
  <div class="ai" id="ai">🤖 AI Explanation Mode:</div>

  <canvas id="graph"></canvas>

  <div class="chat-container">
    <div class="subtitle" style="text-align:left">💬 Canny Goody Chatbot</div>
    <div class="chat-box" id="chatBox">
      <div class="bot-msg">🤖: Hi! I'm Canny Goody. You can ask for <b>easy/hard questions</b>, <b>jokes</b>, or a <b>cheat sheet</b>!</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Ask me something...">
      <button onclick="askAI()">Send</button>
    </div>
  </div>
</div>

<div id="robot">🤖</div>
<div id="equalizer">
  <div class="eq"></div><div class="eq"></div>
  <div class="eq"></div><div class="eq"></div>
</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<video id="video" width="300" height="200" autoplay style="display:none"></video>
<canvas id="scanCanvas" width="300" height="200" style="display:none"></canvas>
<button id="snapBtn" onclick="snapImage()" style="display:none">Scan</button>

<script>
// FLOATING NUMBERS
const bg=document.getElementById("number-bg");
const symbols=["0","1","2","x","+","^","sin","cos","ln","π","∫","dy/dx"];
for(let i=0;i<70;i++){
  let s=document.createElement("span");
  s.className="number";
  s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(6+Math.random()*12)+"s";
  s.style.fontSize=(12+Math.random()*22)+"px";
  s.style.opacity=Math.random();
  bg.appendChild(s);
}

// DOM ELEMENTS
const display=document.getElementById("display");
const order=document.getElementById("order");
const result=document.getElementById("result");
const steps=document.getElementById("steps");
const ai=document.getElementById("ai");
const music=document.getElementById("bgMusic");
const robot=document.getElementById("robot");
const eq=document.getElementById("equalizer");
const volumeSlider=document.getElementById("volumeSlider");
const chatBox=document.getElementById("chatBox");
const chatInput=document.getElementById("chatInput");
let chart;
let lastQuestionExpr = "";
let lastQuestionSolution = "";

// FUNCTIONS
function add(v){display.value+=v}

// CLEAR FUNCTION (Maintains Placeholders)
function clearAll(){
  display.value=""; 
  order.value="1"; // Reset sa 1 pero placeholder ay Order
  steps.innerHTML="Steps:"; 
  ai.innerHTML="🤖 AI Explanation Mode:"; 
  result.innerHTML="Result:";
  if(chart) chart.destroy();
}

function toggleMode(){document.body.classList.toggle("light")}
function toggleMusic(){
  if(music.paused){music.play();robot.style.display="block";eq.style.display="flex";volumeSlider.style.display="block";}
  else{music.pause();robot.style.display="none";eq.style.display="none";volumeSlider.style.display="none";}
}
volumeSlider.addEventListener("input", ()=>{ music.volume = volumeSlider.value; });

function drawGraph(f,df){
 let xs=[],ys=[],dys=[];
 for(let x=-5;x<=5;x+=0.2){
   xs.push(x.toFixed(1));
   try{ ys.push(math.evaluate(f,{x})); dys.push(math.evaluate(df,{x})); }
   catch(e){ ys.push(0); dys.push(0); }
 }
 let ctx=document.getElementById("graph").getContext("2d");
 if(chart)chart.destroy();
 chart=new Chart(ctx,{
   type:'line',
   data:{labels:xs,datasets:[
     {label:'f(x)',data:ys,borderColor:'#2563eb',borderWidth:2,pointRadius:0},
     {label:"f'(x)",data:dys,borderColor:'#dc2626',borderWidth:2,pointRadius:0}
   ]},
   options:{responsive:true}
 });
}

// Step-by-step solver with Full AI Explanation
function solveWithSteps(expr){
  try {
    display.value = expr;
    let n = parseInt(order.value) || 1;
    let currentExpr = expr;
    let stepsText = "";
    let aiText = "🤖 <b>AI Complete Explanation:</b><br>";
    let finalResult = "";

    for(let i = 1; i <= n; i++) {
      let terms = currentExpr.split(/(?=[+-])/);
      let derivedTerms = [];
      stepsText += `<b>Derivative Order ${i}:</b><br>`;
      aiText += `<u>Para sa Order ${i}:</u><br>`;
      
      for(let term of terms){
        term = term.trim();
        if(!term) continue;
        
        let dTerm = math.derivative(term, "x").toString();
        let explanation = "";
        
        if(term.includes("sin")) explanation = `Ginamit ang <b>Trigonometric Rule</b>: Ang derivative ng sin ay cos. Kaya ang d/dx(${term}) ay naging ${dTerm}.`;
        else if(term.includes("cos")) explanation = `Ginamit ang <b>Trigonometric Rule</b>: Ang derivative ng cos ay -sin. Kaya ang d/dx(${term}) ay naging ${dTerm}.`;
        else if(term.includes("tan")) explanation = `Ginamit ang <b>Trigonometric Rule</b>: Ang derivative ng tan ay sec^2. Kaya ang d/dx(${term}) ay naging ${dTerm}.`;
        else if(term.includes("^")) explanation = `Ginamit ang <b>Power Rule</b> (nx^(n-1)): Ibinaba ang exponent at binawasan ng isa. d/dx(${term}) → ${dTerm}.`;
        else if(term.includes("ln")) explanation = `Ginamit ang <b>Logarithmic Rule</b>: Ang derivative ng ln(x) ay 1/x. d/dx(${term}) → ${dTerm}.`;
        else if(term.includes("*") && term.includes("x")) explanation = `Ginamit ang <b>Product Rule</b> para sa multiplication ng terms. d/dx(${term}) → ${dTerm}.`;
        else if(!isNaN(term)) explanation = `Ang <b>Constant Rule</b>: Ang derivative ng kahit anong constant (${term}) ay laging 0.`;
        else explanation = `Ginamit ang <b>Basic Differentiation</b>: d/dx(${term}) → ${dTerm}.`;
        
        derivedTerms.push(dTerm);
        stepsText += `&nbsp;&nbsp;d/dx(${term}) → ${dTerm}<br>`;
        aiText += `• ${explanation}<br>`;
      }
      
      currentExpr = math.simplify(derivedTerms.join("+")).toString();
      stepsText += `Result: <b>${currentExpr}</b><br><br>`;
      aiText += `<i>Kaya ang intermediate result para sa Order ${i} ay: ${currentExpr}</i><br><br>`;
      finalResult = currentExpr;
    }

    aiText += `<b>Konklusyon:</b> Matapos ang ${n} rounds ng differentiation, ang huling sagot ay <b>${finalResult}</b>.`;
    
    result.innerHTML = `Final (${n}${n==1?'st':n==2?'nd':n==3?'rd':'th'}): <b style="color:#38bdf8">${finalResult}</b>`;
    steps.innerHTML = stepsText;
    ai.innerHTML = aiText;
    drawGraph(expr, finalResult);
    
  } catch (err) {
    result.innerHTML = "⚠ Invalid Expression";
    steps.innerHTML = "";
    ai.innerHTML = "May error sa expression na nilagay. Pakicheck ang format.";
  }
}

// Camera scan + upload OCR
const video = document.getElementById("video");
const scanCanvas = document.getElementById("scanCanvas");
const snapBtn = document.getElementById("snapBtn");
const ctx = scanCanvas.getContext("2d");

function openCamera(){
  navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
    video.srcObject = stream; video.style.display="block"; snapBtn.style.display="inline-block";
  }).catch(()=>alert("Camera not supported"));
}

function snapImage(){
  ctx.drawImage(video,0,0,scanCanvas.width,scanCanvas.height);
  scanCanvas.toBlob(blob=>{
    Tesseract.recognize(blob,'eng',{logger:m=>console.log(m)}).then(({data:{text}})=>{
      const cleaned = text.replace(/\n/g,"").replace(/÷/g,"/").replace(/×/g,"*");
      solveWithSteps(cleaned);
      video.style.display="none"; snapBtn.style.display="none";
      video.srcObject.getTracks().forEach(track=>track.stop());
      alert("✅ OCR Result added to solver with steps!");
    });
  });
}

function handleUpload(e){
  const file = e.target.files[0]; if(!file) return;
  Tesseract.recognize(file,'eng',{logger:m=>console.log(m)}).then(({data:{text}})=>{
    const cleaned = text.replace(/\n/g,"").replace(/÷/g,"/").replace(/×/g,"*");
    solveWithSteps(cleaned);
    alert("✅ OCR Result added to solver with steps!");
  });
}

// Voice input
function startVoice(){
 if(!('webkitSpeechRecognition'in window)){alert("Voice not supported");return}
 let rec=new webkitSpeechRecognition(); rec.lang="en-US"; rec.start();
 rec.onresult=e=>{
   let t=e.results[0][0].transcript.toLowerCase();
   t=t.replace(/plus/g,"+").replace(/minus/g,"-").replace(/times/g,"*").replace(/divide/g,"/");
   display.value=t;
   solveWithSteps(t);
 };
}

// Speak result
function speakResult(){speechSynthesis.speak(new SpeechSynthesisUtterance(result.innerText))}

// CHATBOT FULL LOGIC
function askAI() {
  const query = chatInput.value.toLowerCase().trim();
  if(!query) return;

  chatBox.innerHTML += `<div class="user-msg">${chatInput.value}</div>`;
  
  let response = "🤖: Pasensya na, hindi ko nakuha 'yun. Try asking for a 'sample question', 'joke', or 'cheat sheet'!";

  const samples = [
    { text: "Find the derivative of: 5x^2", level: "easy", expr: "5x^2", sol: "Power Rule: (2*5)x^(2-1) = 10x" },
    { text: "Differentiate: sin(x) + 3x", level: "easy", expr: "sin(x) + 3x", sol: "Term by term: sin(x) -> cos(x), 3x -> 3. Answer: cos(x) + 3" },
    { text: "Solve: sin(x^2)", level: "hard", expr: "sin(x^2)", sol: "Chain Rule: cos(x^2) * d/dx(x^2) = 2x*cos(x^2)" },
    { text: "What is d/dx of: x * ln(x)", level: "hard", expr: "x * ln(x)", sol: "Product Rule: (1*ln(x)) + (x*1/x) = ln(x) + 1" }
  ];

  const jokes = [
    "Why was the tangent line so lonely? Because it only touched the curve once!",
    "What's a calculus teacher's favorite snake? A Pi-thon!",
    "Why don't you drink and derive? Because it's hard to find the limit!"
  ];

  if(query === "hi" || query === "hello" || query === "hey" || query === "hoy") {
    response = "🤖: Hello there! I'm **Canny Goody**, your friendly neighborhood calculus tutor. Ready ka na ba mag-solve? 😊";
  }
  else if(query.includes("kamusta") || query.includes("how are you")) {
    response = "🤖: I'm doing great! Ang saya mag-compute ng slopes. Ikaw, kamusta ang pag-aaral mo? ✨";
  }
  else if(query.includes("who are you") || query.includes("sino ka") || query.includes("pangalan")) {
    response = "🤖: I am **Canny Goody**, created by FreddyyGroup! I'm here to make Calculus easy for you. 🚀";
  }
  else if(query.includes("joke")) { response = "🤖: " + jokes[Math.floor(Math.random() * jokes.length)]; }
  else if(query.includes("cheat sheet") || query.includes("formula")) {
    response = `🤖: <b>Calculus Cheat Sheet:</b><br>
    <table class="cheat-table">
      <tr><td>Power</td><td>(x^n)' = n*x^(n-1)</td></tr>
      <tr><td>sin(x)</td><td>cos(x)</td></tr>
      <tr><td>cos(x)</td><td>-sin(x)</td></tr>
      <tr><td>ln(x)</td><td>1/x</td></tr>
      <tr><td>e^x</td><td>e^x</td></tr>
    </table>`;
  }
  else if(query.includes("motivation") || query.includes("hugot") || query.includes("inspire")) {
    response = "🤖: Calculus is hard, but don't give up! Bawat complex curve ay may slope, at bawat problem ay may solution. Kaya mo 'yan! 💪";
  }
  else if(query.includes("question") || query.includes("more") || query.includes("tanong") || query.includes("isa pa")) {
    let filtered = samples;
    if(query.includes("easy")) filtered = samples.filter(s => s.level === "easy");
    if(query.includes("hard")) filtered = samples.filter(s => s.level === "hard");
    
    const pick = filtered[Math.floor(Math.random() * filtered.length)];
    lastQuestionExpr = pick.expr;
    lastQuestionSolution = pick.sol;
    response = `🤖: [${pick.level.toUpperCase()}] ${pick.text}<br><br>Type "answer" or "solution"!`;
  }
  else if(query.includes("answer") || query.includes("sagot")) {
    if(!lastQuestionExpr) response = "🤖: Hingi ka muna ng 'sample question'! 😉";
    else response = `🤖: Ang sagot ay: <b>${math.derivative(lastQuestionExpr, 'x').toString()}</b>`;
  }
  else if(query.includes("solution") || query.includes("paano")) {
    if(!lastQuestionSolution) response = "🤖: Wala pa tayong active question. Tanong ka muna!";
    else response = `🤖: **Solution:** ${lastQuestionSolution}`;
  }
  else if(query.includes("solve this:")) {
    let toSolve = query.split("solve this:")[1].trim();
    solveWithSteps(toSolve);
    response = "🤖: Sige! Nilagay ko na sa solver at in-update ang graph sa itaas! 📈";
  }
  else if(query.includes("thank") || query.includes("salamat")) { response = "🤖: You're very welcome! Happy to help. Aral mabuti! ✨"; }
  else if(query === "ok" || query === "okay" || query === "sige") { response = "🤖: Copy that! Nandito lang ako kung may kailangan ka pa. 👍"; }
  else if(query.includes("derivative") && (query.includes("what") || query.includes("ano"))) {
    response = "🤖: Ang derivative ay ang 'rate of change' o ang slope ng tangent line sa isang graph. Ito ang nagsasabi kung gaano kabilis magbago ang isang function!";
  }

  chatBox.innerHTML += `<div class="bot-msg">${response}</div>`;
  chatInput.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;
}

chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") askAI(); });
</script>
</body>
</html>
